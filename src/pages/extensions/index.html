<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extensions</title>
    <script>
      self.__ddxBase = (function () {
        var p = location.pathname;
        var i = p.indexOf("/internal/");
        if (i !== -1) return p.substring(0, i + 1);
        return new URL("./", location.href).pathname;
      })();
    </script>
    <link rel="icon" type="icon/x-icon" href="../../res/logo.png" />
    <meta property="og:image" content="../../res/logo.png" />
    <link rel="stylesheet" href="/src/css/internal.scss" />

    <script type="module" src="/src/pages/extensions/index.tsx"></script>
  </head>

  <body class="bg-[var(--bg-2)] text-[var(--text)] antialiased">
    <div class="min-h-screen w-full">
      <main class="flex-1 h-screen overflow-y-auto">
        <div class="p-8 max-w-5xl space-y-10 mx-auto">
          <header class="space-y-2">
            <h1 class="text-3xl font-bold text-[var(--text)]">Extensions</h1>
            <p class="text-sm text-[var(--proto)]">
              Install and manage browser extensions. Drop a
              <code class="px-1 py-0.5 rounded bg-[var(--white-05)] text-xs">.crx</code>,
              <code class="px-1 py-0.5 rounded bg-[var(--white-05)] text-xs">.zip</code>,
              or
              <code class="px-1 py-0.5 rounded bg-[var(--white-05)] text-xs">.xpi</code>
              file below to begin.
            </p>
          </header>

          <!-- Install dropzone -->
          <section class="space-y-3">
            <div
              id="helium-dropzone"
              class="border-2 border-dashed border-[var(--white-10)] rounded-xl p-10 text-center cursor-pointer transition-colors hover:border-[var(--main)] hover:bg-[var(--white-05)]"
            >
              <i
                data-lucide="upload-cloud"
                class="h-12 w-12 mx-auto mb-3 text-[var(--proto)]"
              ></i>
              <p class="text-sm text-[var(--text)] mb-1">
                <strong>Drop an extension file here</strong> or click to choose
              </p>
              <p class="text-xs text-[var(--proto)]">
                Accepts .crx, .zip, .xpi · multiple files supported
              </p>
              <input
                id="helium-file-input"
                type="file"
                accept=".crx,.zip,.xpi,application/zip,application/x-chrome-extension"
                multiple
                class="hidden"
              />
            </div>
            <div id="helium-install-status" class="space-y-2"></div>
          </section>

          <!-- Installed list -->
          <section class="space-y-4">
            <div class="flex items-center justify-between">
              <h2 class="text-xl font-semibold text-[var(--text)]">
                Installed
              </h2>
              <span
                id="helium-extension-count"
                class="text-xs text-[var(--proto)]"
              ></span>
            </div>
            <div
              id="helium-extension-list"
              class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"
            ></div>
            <div
              id="helium-extension-empty"
              class="hidden rounded-xl border border-dashed border-[var(--white-10)] p-10 text-center"
            >
              <i
                data-lucide="puzzle"
                class="h-10 w-10 mx-auto mb-3 text-[var(--proto)]"
              ></i>
              <p class="text-sm text-[var(--proto)]">
                No extensions installed yet. Drop a file above to begin.
              </p>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
